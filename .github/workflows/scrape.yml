name: Daily News Scrape & Load

# Schedule: setiap 6 jam di menit 17 UTC.
# Perkiraan WIB: 07:17, 13:17, 19:17, 01:17.
# Menit 17 dipilih supaya tidak tepat di awal jam, karena scheduled workflow
# lebih rawan delay/drop saat load tinggi di menit 00.
#
# Scheduled run memakai dynamic scrape window dari pipeline_state:
# last successful run -> now + buffer. Manual run bisa override `hours`.
on:
  schedule:
    - cron: "17 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Window jam ke belakang"
        default: "24"
        required: false
      max_per_keyword:
        description: "Cap artikel per keyword. 5 = aman quota, 10 = coverage lebih luas"
        default: "5"
        required: false

permissions:
  contents: read

concurrency:
  group: daily-news-scrape-main
  cancel-in-progress: false

jobs:
  scrape-and-load:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      VERCEL_URL: ${{ secrets.VERCEL_URL }}
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Compute scrape window
        id: window
        # Scheduled run tidak lagi fixed 24h. Window dihitung dari last success
        # dengan buffer 3 jam, lalu di-clamp ke 6-48 jam.
        run: |
          HOURS="$(python compute_scrape_window.py \
            --state-name daily_news_scrape \
            --default-hours 24 \
            --min-hours 6 \
            --max-hours 48 \
            --buffer-hours 3)"
          echo "hours=${HOURS}" >> "$GITHUB_OUTPUT"
          echo "Using dynamic scrape window: ${HOURS} hours"

      - name: Run scraper (fetch + LM analysis + ID/EN translation)
        # fetch_news.py produce dual-language output dalam satu Groq call per artikel.
        # Manual workflow_dispatch bisa override hours/max_per_keyword.
        # Scheduled run memakai hours dari step Compute scrape window.
        run: |
          python fetch_news.py \
            --use-groq \
            --hours "${{ github.event.inputs.hours || steps.window.outputs.hours }}" \
            --max-per-keyword "${{ github.event.inputs.max_per_keyword || '5' }}" \
            --output news.csv

      - name: Load to BigQuery
        # bq_load.py skip gracefully kalau JSON kosong (0 artikel) dan exit 0.
        # Loader memakai non-DML dedup overwrite supaya overlap window tidak
        # menambah duplicate rows, dan tetap kompatibel dengan BigQuery free tier.
        run: python bq_load.py news.json

      - name: Update scrape state
        # State di-update setelah main scrape + main BigQuery load sukses.
        # Competitor scrape bersifat supplementary, jadi tidak menahan state utama.
        run: python update_pipeline_state.py --state-name daily_news_scrape

      - name: Scrape competitor counts (Roche, Pfizer, Novartis, etc.)
        # Count-only scraper untuk Share of Voice tracking di analytics page.
        # No Groq calls. Roche Indonesia special: tidak apply SOURCE_WHITELIST.
        # continue-on-error: competitor data hanya supplementary.
        continue-on-error: true
        run: |
          python fetch_competitor_counts.py \
            --hours "${{ github.event.inputs.hours || steps.window.outputs.hours }}" \
            --output competitor_news.json

      - name: Load competitor counts to BigQuery
        # Loader memakai non-DML dedup overwrite by (company, url), jadi overlap
        # window tidak menambah duplicate rows.
        continue-on-error: true
        run: python bq_load_competitors.py competitor_news.json

      - name: Invalidate Vercel cache
        # Beritahu Next.js drop cached articles. Step di-skip kalau secret belum di-set.
        if: success() && env.VERCEL_URL != '' && env.REVALIDATE_SECRET != ''
        run: |
          curl -X POST "${VERCEL_URL%/}/api/revalidate" \
            -H "Authorization: Bearer ${REVALIDATE_SECRET}" \
            -f -s -S

      - name: Upload artifact (audit trail, 7 hari)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-output-${{ github.run_id }}
          path: |
            news.csv
            news.json
            competitor_news.json
          retention-days: 7
          if-no-files-found: ignore
